
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Live Disaster Prediction</title>
    <link rel="stylesheet" href="design.css"> 
    <style>
        /* --- GALAXY BACKGROUND STYLES --- */
        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(ellipse at bottom, #1b2735 0%, #090a0f 100%);
            overflow-x: hidden;
            min-height: 100vh;
        }
        #galaxy-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1; /* Keeps stars behind the box */
        }
        .star {
            position: absolute;
            background-color: white;
            border-radius: 50%;
            box-shadow: 0 0 5px rgba(255, 255, 255, 0.8);
            animation: twinkle infinite alternate, floatUp infinite linear;
        }
        @keyframes twinkle {
            0% { opacity: 0.2; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1.2); }
        }
        @keyframes floatUp {
            0% { transform: translateY(0); }
            100% { transform: translateY(-100vh); }
        }

        /* --- PREDICTION BOX STYLES --- */
        .prediction-box { 
            background: rgba(26, 26, 26, 0.85); /* Slightly transparent to see stars behind it */
            backdrop-filter: blur(5px); /* Cool glass effect */
            padding: 40px; 
            border: 2px solid #00f3ff; 
            border-radius: 10px; 
            width: 400px; 
            margin: 100px auto; 
            text-align: center; 
            color: white; 
            font-family: sans-serif;
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.2);
        }
        input { 
            width: 90%; 
            padding: 12px; 
            margin: 10px 0; 
            background: #333; 
            color: white; 
            border: 1px solid #555; 
            border-radius: 5px; 
            font-size: 16px;
        }
        button { 
            background: #00f3ff; 
            color: black; 
            padding: 12px 20px; 
            font-weight: bold; 
            cursor: pointer; 
            border: none; 
            margin-top: 15px; 
            width: 95%; 
            font-size: 16px; 
            border-radius: 5px;
            transition: 0.3s;
        }
        button:hover {
            box-shadow: 0 0 15px #00f3ff;
        }
        #result { 
            margin-top: 25px; 
            font-size: 20px; 
            font-weight: bold; 
            padding: 15px; 
            border-radius: 8px;
        }
        /* Color Classes */
        .safe { color: #00e676; }
        .medium { color: #ffeb3b; }
        .danger { color: #ff4444; }
        .guide-text { font-size: 13px; color: #aaa; margin-top: 15px; border-top: 1px solid #444; padding-top: 10px; line-height: 1.5; }
    </style>
</head>
<body>

    <div id="galaxy-bg"></div>

    <div class="prediction-box">
        <h2 id="page-title">Loading Model...</h2>
        <p>Enter current sensor data below:</p>
        
        <div id="input-container"></div>
        
        <button onclick="getLivePrediction()">PREDICT</button>
        <div id="result"></div>
    </div>

    <script>
        // --- 1. GALAXY GENERATOR ---
        function createStars() {
            const bg = document.getElementById('galaxy-bg');
            const starCount = 100; // You can change this to 200 for more stars!

            for (let i = 0; i < starCount; i++) {
                let star = document.createElement('div');
                star.className = 'star';
                
                // Randomize size, position, and speed for natural look
                let size = Math.random() * 3 + 1; // 1px to 4px
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                star.style.left = Math.random() * 100 + 'vw';
                star.style.top = Math.random() * 100 + 'vh';
                
                let twinkleDuration = Math.random() * 2 + 1; // 1s to 3s
                let floatDuration = Math.random() * 20 + 15; // 15s to 35s
                star.style.animationDuration = `${twinkleDuration}s, ${floatDuration}s`;
                
                bg.appendChild(star);
            }
        }

        // --- 2. AI CONFIGURATION ---
        const disasterConfig = {
            'landslide': { title: 'Landslide', features: ['Slope Steepness', 'Precipitation Level', 'Terrain Curvature'] },
            'flood': { title: 'Flood', features: ['Monsoon Intensity', 'Drainage Systems Score', 'Siltation Score'] },
            'cyclone': { title: 'Cyclone', features: ['Atmospheric Pressure (mb)', 'Wind Speed (km/h)', 'Humidity (%)'] },
            'drought': { title: 'Drought', features: ['Precipitation (mm)', 'Humidity (%)', 'Average Temp (C)'] },
            'heatwave': { title: 'Heatwave', features: ['Max Temp (C)', 'Average Temp (C)', 'Relative Humidity (%)'] },
            'earthquake': { title: 'Earthquake', features: ['Magnitude', 'Longitude', 'Depth (km)'] },
            'tsunami': { title: 'Tsunami', features: ['Significance Score', 'Magnitude', 'Depth (km)'] },
            'forestfires': { title: 'Forest Fire', features: ['Relative Humidity (%)', 'Fuel Moisture (FFMC)', 'Temperature (C)'] }
        };

        const urlParams = new URLSearchParams(window.location.search);
        const activeModel = urlParams.get('model');

        // --- 3. ON PAGE LOAD ---
        window.onload = function() {
            createStars(); // Start the galaxy!

            if (!activeModel || !disasterConfig[activeModel]) {
                document.getElementById('page-title').innerText = "Model Not Found";
                return;
            }
            const config = disasterConfig[activeModel];
            document.getElementById('page-title').innerText = config.title + " Live AI";
            let inputsHTML = '';
            for (let i = 0; i < config.features.length; i++) {
                inputsHTML += `<input type="number" id="input-${i}" placeholder="${config.features[i]}" step="any">`;
            }
            document.getElementById('input-container').innerHTML = inputsHTML;
        };

        // --- 4. PREDICTION LOGIC ---
        async function getLivePrediction() {
            const config = disasterConfig[activeModel];
            const resultDiv = document.getElementById('result');
            let userInputs = {};
            for (let i = 0; i < config.features.length; i++) {
                let val = document.getElementById(`input-${i}`).value;
                if (!val) { alert("Please fill all fields!"); return; }
                userInputs[`f${i+1}`] = parseFloat(val);
            }

            resultDiv.innerHTML = "Analyzing AI...";
            resultDiv.className = "";
            resultDiv.style.color = "white";

            try {
                const response = await fetch(`https://disaster-ai-1-o9ui.onrender.com/predict/${activeModel}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(userInputs)
                });

                const answer = await response.json();
                const prob = answer.probability;
                const guide = `<div class="guide-text"><b>Risk Guide:</b><br>0% to 30%: SAFE<br>40% to 60%: MEDIUM<br>70% to 100%: DANGER</div>`;

                // LOGIC RANGES
               if (prob <= 30) {
                    resultDiv.innerHTML = `✅🦺 SAFE AREA<br>Risk Level: ${prob}% ${guide}`;
                    resultDiv.className = "safe";
                } 
                else if (prob >= 40 && prob <= 60) {
                    resultDiv.innerHTML = `⚠️⚡ MEDIUM RISK<br>Risk Level: ${prob}% ${guide}`;
                    resultDiv.className = "medium";
                } 
                else if (prob >= 70) {
                    resultDiv.innerHTML = `🚨💀 DANGER DETECTED<br>Risk Level: ${prob}% ${guide}`;
                    resultDiv.className = "danger";
                }
                else {
                    resultDiv.innerHTML = `🤔💭 UNCERTAIN<br>Risk Level: ${prob}% ${guide}`;
                }
            } catch (error) {
                resultDiv.innerHTML = "Error: Is the Python Server running?";
                resultDiv.className = "danger";
            }
        }
    </script>
</body>
</html>
